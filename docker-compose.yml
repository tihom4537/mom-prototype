services:
  backend:
    image: ghcr.io/tihom4537/mom-backend:latest
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gemini-2.0-flash}
      - SARVAMAI_API_KEY=${SARVAMAI_API_KEY}
    restart: unless-stopped

  frontend:
    image: ghcr.io/tihom4537/mom-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped


# docker-compose.test.yml
#
# Self-contained testing environment — includes a local PostgreSQL instance.
# No external database required.
#
# Usage:
#   1. Copy .env.example to .env and fill in GEMINI_API_KEY and SARVAMAI_API_KEY.
#   2. docker-compose -f docker-compose.test.yml up --build
#   3. API is available at http://localhost:8000
#
# Note: DATABASE_URL is pre-configured to the local Postgres service below.
#       You do NOT need to set DATABASE_URL in .env when using this file.

version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: mom-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: testdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    container_name: mom-test-migrate
    command: python scripts/migrate_ai_feedback.py
    environment:
      DATABASE_URL: postgresql://testuser:testpassword@db:5432/testdb
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    container_name: mom-test-api
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SARVAMAI_API_KEY: ${SARVAMAI_API_KEY}
      DATABASE_URL: postgresql://testuser:testpassword@db:5432/testdb
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gemini-3.1-flash-lite-preview}
    depends_on:
      migrate:
        condition: service_completed_successfully

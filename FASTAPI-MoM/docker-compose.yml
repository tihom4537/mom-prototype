version: "3.9"

services:
  api:
    build: .
    container_name: mom-ai-feedback-api
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SARVAMAI_API_KEY: ${SARVAMAI_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gemini-3.1-flash-lite-preview}

  nginx:
    image: nginx:alpine
    container_name: mom-ai-feedback-nginx
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

